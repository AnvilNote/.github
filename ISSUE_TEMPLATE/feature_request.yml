name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please describe the problem before jumping to the solution — it helps us evaluate the request.
  - type: dropdown
    id: repository
    attributes:
      label: Related repository
      description: Which repository does this feature relate to?
      options:
        - anvilnote
        - anvilnote-web
        - anvilnote-api
        - anvilnote-renderer
        - anvilnote-docx-exporter
        - anvilnote-desktop
        - not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's missing or difficult today?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe how and when you'd use this.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might be relevant, e.g. mockups, references, related issues.
    validations:
      required: false
