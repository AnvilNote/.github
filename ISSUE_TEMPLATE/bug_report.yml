name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.
  - type: dropdown
    id: repository
    attributes:
      label: Affected repository
      description: Which repository does this bug affect?
      options:
        - anvilnote
        - anvilnote-web
        - anvilnote-api
        - anvilnote-renderer
        - anvilnote-docx-exporter
        - anvilnote-desktop
        - not sure
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. macOS 14.5, Windows 11, Ubuntu 22.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / commit
      description: Version number, build number, or commit hash
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so someone else can reproduce it.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, error messages, or attach screenshots.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might be relevant.
    validations:
      required: false
